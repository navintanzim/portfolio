<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project</title>
    <link rel="icon" href="../public/favicon.ico">
    <link rel="stylesheet" href="../assets/site.css">
</head>
<body data-project-slug="task-manager">
    <div class="page-shell">
        <a class="back-link" href="../index.html#projects">← Back to Featured Projects</a>

        <section class="hero detail-hero">
            <div>
                <div class="eyebrow" id="project-eyebrow"></div>
                <h1 id="project-title"></h1>
                <p class="lead" id="project-summary"></p>

                <div class="meta-list">
                    <span class="meta-pill" id="project-period"></span>
                    <span class="meta-pill" id="project-featured">Featured Project</span>
                </div>

                <div class="tag-list" id="project-tags"></div>
                <div class="link-list" id="project-links"></div>
            </div>

            <div id="project-cover"></div>
        </section>

        <section class="content-grid project-detail-grid">
            <article class="content-card">
                <h2>Overview</h2>
                <p class="body-copy" id="project-overview"></p>
            </article>

            <aside class="content-card">
                <h2>Highlights</h2>
                <div class="highlight-list" id="project-highlights"></div>
            </aside>
        </section>

        <section class="content-card" style="margin-top: 1.25rem;">
            <h2>Screenshots</h2>
            <div class="image-grid" id="project-screenshots"></div>
        </section>
    </div>

    <script type="module" src="../assets/project.js"></script>
</body>
</html>
